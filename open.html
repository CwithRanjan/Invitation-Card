<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url(./Pink\ and\ Gold\ Floral\ Wedding\ Invitation.png);
        }
        .container {
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }

        .address {
            width: 500px;
            height: 50px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;

            /* background-color: rgb(253, 241, 218); */
        }

        a {
                color: black;
                text-decoration: none;
            }
        
        @media (min-width: 481px) {

            .container {
                justify-content: end;
            }

            img {
                width: 500px;
                height: auto;
            }
        }

        @media(max-width: 480px) {

            body {
                background-color: red;
            }

            .container {
                width: 100vw;
                height:100vh;
            }

            img {
                width: 100%;
                height: auto;
            }

            .container {
                justify-content: center;
                align-items: center;
            }

            .address {
        
                width: 100%;
                height:50px;
                /* background-color: rgb(253, 241, 218); */
                /* background-image: url(./Pink\ and\ Gold\ Floral\ Wedding\ Invitation.png); */
                display: flex;
                justify-content: space-evenly;
                align-items: center;
                gap: 10px;
            }
            
            


           
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="./2.png" alt="">
        </div>

        <div class="address">
            <p>
                <a href="https://maps.app.goo.gl/iQLbPRzbrFkcSvG88" target="_blank">
                    📍Venue on Map 
                </a>
            </p>

            <a href="tel:8521204791">
                📞 8521204791
            </a>
            <a href="tel:9472397129">
                📞 9472397129
            </a>


        </div>
    </div>

</body>

</html>
